# ExternalSecret: declarative pull of Vault secret into a native K8s Secret,
# refreshed automatically on an interval - this IS the rotation mechanism.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sample-service-secrets
  namespace: prod-sample-service
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: sample-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: sample-service/database
        property: password
    - secretKey: API_KEY
      remoteRef:
        key: sample-service/external-api
        property: key
