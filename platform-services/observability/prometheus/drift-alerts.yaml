apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gitops-drift-alerts
  labels:
    release: prometheus
spec:
  groups:
    - name: argocd-drift
      rules:
        - alert: ArgoCDAppOutOfSync
          expr: argocd_app_info{sync_status!="Synced"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{ $labels.name }} has drifted from Git"
            description: "Application has been out of sync for 10+ minutes - indicates manual/unauthorized change or a failing sync."
        - alert: ArgoCDAppUnhealthy
          expr: argocd_app_info{health_status!="Healthy"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is unhealthy"
