apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging-sample-service
namePrefix: staging-
resources:
  - ../../base
patches:
  - path: replica-patch.yaml
images:
  - name: ghcr.io/org/sample-service
    newTag: 1.0.0-rc.3       # staging tracks release-candidate tags
configMapGenerator:
  - name: sample-service-config
    literals:
      - LOG_LEVEL=info
      - ENVIRONMENT=staging
