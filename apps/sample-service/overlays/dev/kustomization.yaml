apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev-sample-service
namePrefix: dev-
resources:
  - ../../base
patches:
  - path: replica-patch.yaml
  - path: resources-patch.yaml
images:
  - name: ghcr.io/org/sample-service
    newTag: dev-latest
configMapGenerator:
  - name: sample-service-config
    literals:
      - LOG_LEVEL=debug
      - ENVIRONMENT=dev
