apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-service
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sample-service-role
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sample-service-rolebinding
subjects:
  - kind: ServiceAccount
    name: sample-service
roleRef:
  kind: Role
  name: sample-service-role
  apiGroup: rbac.authorization.k8s.io
