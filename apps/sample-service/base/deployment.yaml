apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service
  labels:
    app.kubernetes.io/name: sample-service
    app.kubernetes.io/part-of: gitops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-service
    spec:
      serviceAccountName: sample-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sample-service
          image: ghcr.io/org/sample-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: sample-service-secrets   # populated by External Secrets Operator
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
