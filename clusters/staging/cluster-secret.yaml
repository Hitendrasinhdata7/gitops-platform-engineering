# Cluster registration secret (ArgoCD "add cluster" pattern).
# In production, this Secret's data is populated by a sealed-secrets /
# Vault-backed pipeline step - never committed in plaintext.
apiVersion: v1
kind: Secret
metadata:
  name: staging-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: staging-cluster
  server: https://staging-cluster.internal
  config: |
    {
      "tlsClientConfig": {
        "insecure": false,
        "caData": "<REDACTED - injected via CI secret store>"
      }
    }
