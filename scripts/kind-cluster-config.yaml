# Local multi-node kind cluster that mimics prod topology (1 control-plane,
# 2 workers) so you can test the full stack (ArgoCD + Vault + ESO + ingress)
# entirely on a laptop, no cloud cost.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
      - containerPort: 443
        hostPort: 8443
  - role: worker
  - role: worker
